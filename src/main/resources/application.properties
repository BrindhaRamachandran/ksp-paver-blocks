spring.datasource.url=${JDBC_DATABASE_URL:jdbc:mysql://localhost:3306/KSP_Pavers?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata&useUnicode=true&characterEncoding=UTF-8}
